# .github/workflows/crawl.yml
# 매월 1일 자동으로 공인기관 목록을 크롤링해서 CSV 업데이트

name: 공인기관 목록 자동 갱신

on:
  schedule:
    - cron: '0 2 1 * *'   # 매월 1일 오전 2시 (UTC)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 크롤링 실행
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python crawl_accredited_labs.py

      - name: 결과 확인
        run: |
          echo "=== 수집된 기관 수 ==="
          wc -l accredited_labs.csv
